name: Generate Psychology Shorts with Nemotron

on:
  workflow_dispatch:
    inputs:
      narration_text:
        description: 'Teks narasi untuk Shorts'
        required: true
        type: string

jobs:
  generate-audio-and-visuals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Step 1 - Generate TTS Audio (Gemini 3.1 Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NARRATION_TEXT: ${{ inputs.narration_text }}
        run: |
          # (Gunakan script Step 1 yang sebelumnya, karena model Gemini 3.1 Flash TTS masih yang terbaik untuk audio output)
          python -c "import os, json, requests, base64; 
          url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=' + os.environ['GEMINI_API_KEY'];
          payload = {'contents': [{'parts': [{'text': 'Read this in Indonesian natural voice: ' + os.environ['NARRATION_TEXT']}]}], 'generationConfig': {'responseModalities': ['AUDIO'], 'speechConfig': {'voiceConfig': {'prebuiltVoiceConfig': {'voiceName': 'Charon'}}, 'languageCode': 'id-ID'}}};
          resp = requests.post(url, json=payload).json();
          with open('audio.wav', 'wb') as f: f.write(base64.b64decode(resp['candidates'][0]['content']['parts'][0]['inlineData']['data']))"

      - name: Step 2 - Analyze Audio with Nemotron-3-Nano-Omni
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat << 'EOF' > analyze.py
          import os, json, requests, base64

          with open("audio.wav", "rb") as f:
              audio_b64 = base64.b64encode(f.read()).decode('utf-8')

          # Konfigurasi Nemotron: Reasoning HARUS False untuk input audio
          url = "https://openrouter.ai/api/v1/chat/completions"
          headers = {
              "Authorization": f"Bearer {os.environ['OPENROUTER_API_KEY']}",
              "Content-Type": "application/json"
          }
          
          payload = {
              "model": "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free",
              "messages": [
                  {
                      "role": "user",
                      "content": [
                          {"type": "text", "text": "You are a storyboard director. Analyze this audio and return a JSON array with: start_time, end_time, narration_text, image_prompt (2D flat illustration, psychology style). Do not use reasoning/thinking blocks."},
                          {"type": "input_audio", "input_audio": {"data": audio_b64, "format": "wav"}}
                      ]
                  }
              ],
              "extra_body": {"reasoning": False} 
          }

          response = requests.post(url, headers=headers, json=payload)
          data = response.json()
          
          with open("storyboard_prompts.json", "w") as f:
              # Membersihkan output jika model menyertakan teks tambahan selain JSON
              content = data['choices'][0]['message']['content']
              f.write(content)
          EOF
          python analyze.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: |
            audio.wav
            storyboard_prompts.json
