name: Generate Psychology Shorts with Nemotron

on:
  workflow_dispatch:
    inputs:
      narration_text:
        description: 'Teks narasi untuk Shorts'
        required: true
        type: string

jobs:
  generate-audio-and-visuals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Step 1 - Generate TTS Audio
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NARRATION_TEXT: ${{ inputs.narration_text }}
        run: |
          python -c "import os, json, requests, base64; 
          url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=' + os.environ['GEMINI_API_KEY'];
          payload = {'contents': [{'parts': [{'text': 'Read this in Indonesian natural voice: ' + os.environ['NARRATION_TEXT']}]}], 'generationConfig': {'responseModalities': ['AUDIO'], 'speechConfig': {'voiceConfig': {'prebuiltVoiceConfig': {'voiceName': 'Charon'}}, 'languageCode': 'id-ID'}}};
          resp = requests.post(url, json=payload).json();
          with open('audio.wav', 'wb') as f: f.write(base64.b64decode(resp['candidates'][0]['content']['parts'][0]['inlineData']['data']))"

      - name: Step 2 - Analyze Audio with Nemotron
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat << 'EOF' > analyze.py
          import os, json, requests, base64

          with open("audio.wav", "rb") as f:
              audio_b64 = base64.b64encode(f.read()).decode('utf-8')

          url = "https://openrouter.ai/api/v1/chat/completions"
          headers = {"Authorization": f"Bearer {os.environ['OPENROUTER_API_KEY']}", "Content-Type": "application/json"}
          
          # Payload dengan dua opsi (input_audio dan fallback image_url)
          payload = {
              "model": "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free",
              "messages": [
                  {
                      "role": "user",
                      "content": [
                          {"type": "text", "text": "Analyze this audio. Return ONLY a JSON array with: start_time, end_time, narration_text, image_prompt (2D flat illustration, psychology style). Do not add explanation, just return JSON."},
                          {"type": "input_audio", "input_audio": {"data": audio_b64, "format": "wav"}}
                      ]
                  }
              ]
          }

          response = requests.post(url, headers=headers, json=payload)
          data = response.json()

          # Fallback jika input_audio ditolak
          if 'error' in data:
              print("⚠️ input_audio gagal, mencoba fallback image_url...")
              payload["messages"][0]["content"][1] = {"type": "image_url", "image_url": {"url": f"data:audio/wav;base64,{audio_b64}"}}
              response = requests.post(url, headers=headers, json=payload)
              data = response.json()

          if 'choices' not in data:
              print("❌ API Error:", json.dumps(data, indent=2))
              exit(1)

          content = data['choices'][0]['message']['content'].replace('```json', '').replace('
```', '')
          with open("storyboard_prompts.json", "w") as f:
              f.write(content)
          EOF
          python analyze.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: |
            audio.wav
            storyboard_prompts.json
