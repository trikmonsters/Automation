name: Generate Psychology Shorts TTS & Storyboard

on:
  workflow_dispatch:
    inputs:
      narration_text:
        description: 'Teks narasi untuk Shorts'
        required: true
        type: string

jobs:
  generate-audio-and-visuals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Step 1 - Generate TTS Audio
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NARRATION_TEXT: ${{ inputs.narration_text }}
        run: |
          cat << 'EOF' > generate_tts.py
          import os, json, requests, base64, sys, time

          api_key = os.environ.get("GEMINI_API_KEY")
          text = os.environ.get("NARRATION_TEXT")
          
          if not api_key:
              print("❌ Error: GEMINI_API_KEY belum disetel.")
              sys.exit(1)

          model = "gemini-3.1-flash-tts-preview"
          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"

          # Prompt dipertegas agar AI TIDAK menambahkan basa-basi dan langsung membacakan teks
          combined_prompt = (
              "You are a professional voiceover artist for a psychology YouTube Shorts channel. "
              "Read the following text exactly as written. DO NOT add any introductions, confirmations, or extra words. "
              "Keep your tone calm, analytical, empathetic, and slightly mysterious. Use dynamic pacing.\n\n"
              f"Text to read: {text}"
          )

          payload = {
              "contents": [{"parts": [{"text": combined_prompt}]}],
              "generationConfig": {
                  "responseModalities": ["AUDIO"],
                  "speechConfig": {"voiceConfig": {"prebuiltVoiceConfig": {"voiceName": "Charon"}}}
              }
          }

          headers = {"Content-Type": "application/json"}
          
          max_retries = 3
          for attempt in range(max_retries):
              print(f"⏳ Memproses Audio TTS... (Percobaan {attempt + 1}/{max_retries})")
              response = requests.post(url, headers=headers, json=payload)
              
              if response.status_code == 200:
                  data = response.json()
                  
                  # Ekstraksi tipe file dan base64 data
                  inline_data = data['candidates'][0]['content']['parts'][0]['inlineData']
                  mime_type = inline_data['mimeType']
                  audio_base64 = inline_data['data']
                  
                  # Deteksi ekstensi yang benar agar file tidak korup
                  ext = "wav"
                  if "mp3" in mime_type: ext = "mp3"
                  elif "ogg" in mime_type: ext = "ogg"
                  
                  filename = f"psychology_narration.{ext}"
                  
                  with open(filename, "wb") as f:
                      f.write(base64.b64decode(audio_base64))
                      
                  # Simpan nama file dan mimeType ke GitHub ENV agar bisa dipakai di Step 2
                  with open(os.environ['GITHUB_ENV'], 'a') as env_file:
                      env_file.write(f"AUDIO_FILENAME={filename}\n")
                      env_file.write(f"AUDIO_MIMETYPE={mime_type}\n")
                      
                  print(f"✅ File audio berhasil dibuat: {filename} ({mime_type})")
                  break
              elif response.status_code in [503, 429]:
                  wait_time = 10 * (attempt + 1)
                  print(f"⚠️ Server sibuk (Error {response.status_code}). Menunggu {wait_time} detik...")
                  time.sleep(wait_time)
              else:
                  print("❌ API Error:", response.text)
                  sys.exit(1)
          else:
              print("❌ Gagal membuat audio setelah maksimal percobaan.")
              sys.exit(1)
          EOF
          python generate_tts.py

      - name: Step 2 - Analyze Audio & Generate Storyboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat << 'EOF' > analyze_audio.py
          import os, json, requests, base64, sys, time

          api_key = os.environ.get("GEMINI_API_KEY")
          
          # Mengambil nama file dari Step 1 secara dinamis
          filename = os.environ.get("AUDIO_FILENAME", "psychology_narration.wav")
          mime_type = os.environ.get("AUDIO_MIMETYPE", "audio/wav")
          
          with open(filename, "rb") as f:
              audio_b64 = base64.b64encode(f.read()).decode('utf-8')

          model = "gemini-3.5-flash"
          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"

          prompt = """You are a professional storyboard director for a psychology YouTube Shorts channel.
          Your job is to analyze the provided audio and split the narration into as many visual scenes as necessary.
          Your job is NOT to summarize.

          Rules:
          Every time there is:
          - new idea
          - emotional shift
          - visual object
          - action
          - metaphor
          - comparison
          - dramatic pause
          - psychological emphasis
          - location change
          - perspective change
          create NEW IMAGE.

          Never merge scenes.
          If one paragraph needs 18 images, produce 18.
          If one sentence needs 4 images, produce 4.
          Quality is more important than quantity. There is NO LIMIT.
          
          Visual Style constraints: 
          All image_prompts MUST be designed to generate highly detailed 2D illustrations. Use terms like "2D flat illustration, anime style, flat colors, psychology vector art, highly detailed 2D".

          You MUST return the output ONLY as a JSON Array format with the following keys for each object:
          - "start_time" (e.g., "00:00.0")
          - "end_time" (e.g., "00:02.5")
          - "narration_text" (the exact words spoken in this segment)
          - "image_prompt" (the highly detailed prompt for the 2D AI image generator)
          """

          payload = {
              "contents": [{
                  "parts": [
                      {"text": prompt},
                      {"inlineData": {"mimeType": mime_type, "data": audio_b64}}
                  ]
              }],
              "generationConfig": {
                  "responseMimeType": "application/json"
              }
          }

          headers = {"Content-Type": "application/json"}
          
          max_retries = 4
          for attempt in range(max_retries):
              print(f"⏳ Memproses Analisis Storyboard... (Percobaan {attempt + 1}/{max_retries})")
              response = requests.post(url, headers=headers, json=payload)
              
              if response.status_code == 200:
                  data = response.json()
                  storyboard_json = data['candidates'][0]['content']['parts'][0]['text']
                  with open("storyboard_prompts.json", "w") as f:
                      f.write(storyboard_json)
                  print("✅ Storyboard JSON berhasil dibuat: storyboard_prompts.json")
                  break
              elif response.status_code in [503, 429]:
                  wait_time = 15 * (attempt + 1)
                  print(f"⚠️ Server API sibuk (Error {response.status_code}). Menunggu {wait_time} detik untuk retry...")
                  time.sleep(wait_time)
              else:
                  print("❌ API Error:", response.text)
                  sys.exit(1)
          else:
              print("❌ Gagal membuat storyboard setelah maksimal percobaan.")
              sys.exit(1)
          EOF
          python analyze_audio.py

      - name: Upload Audio and Storyboard Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: psychology-shorts-assets
          # Menggunakan wildcard (*) agar file apapun entah itu .mp3, .ogg, atau .wav otomatis terupload
          path: |
            psychology_narration.*
            storyboard_prompts.json
          retention-days: 5
