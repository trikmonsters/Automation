name: Playwright Image Generator Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install @playwright/test playwright
          npx playwright install --with-deps

      - name: Create Test Script
        run: |
          cat <<EOF > generate.spec.js
          const { test, expect } = require('@playwright/test');
          const fs = require('fs');

          test('Generate and save image', async ({ page }) => {
            await page.goto('https://freegen.app/');
            
            // 1. Pilih aspect ratio 9:16
            await page.selectOption('#aspectRatioSelect', '9:16');
            
            // 2. Masukkan Prompt Detail
            const prompt = 'A professional psychologist illustration, clean flat vector style. A friendly young male, fair skin, short brown hair, round glasses, warm smile. Wearing a tailored navy blue suit, white shirt, blue brain-icon tie, pocket square. Standing center, holding a clipboard in left hand, right hand presenting an open palm. Above his palm floats a simple monochrome line-art icon of a patient on a therapy couch. Minimalist office background with thin gray outlines: bookshelf, framed certificate, armchair, and indoor plant. Soft muted colors, clean composition, educational poster aesthetic. Proportions are slightly cartoonish with large head, expressive eyes, elegant posture. At the top, bold uppercase text: "PROFESSIONAL PSYCHOLOGIST". High readability, white background, vector artwork, professional infographic style.';
            
            await page.fill('#prompt', prompt);
            await page.keyboard.press('Enter');
            
            // 3. Tunggu hasil (Timeout 90 detik untuk proses AI)
            const imageContainer = page.locator('#imageContainer');
            await expect(imageContainer).toBeVisible({ timeout: 90000 });
            
            // 4. Proses Download
            const generatedImage = imageContainer.locator('img');
            const src = await generatedImage.getAttribute('src');
            
            // Bersihkan format Base64 dan simpan
            const base64Data = src.replace(/^data:image\/[a-z]+;base64,/, "");
            fs.writeFileSync('./hasil-gambar.jpg', base64Data, 'base64');
          });
          EOF

      - name: Run Playwright
        run: npx playwright test generate.spec.js

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "psikolog-${{ github.run_id }}"
          name: "Ilustrasi Psikolog - Run ${{ github.run_id }}"
          files: ./hasil-gambar.jpg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
