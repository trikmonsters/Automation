name: Playwright YouTube Shorts Downloader

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan workflow ini secara manual dari GitHub Actions UI

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-on-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Script
        run: |
          node -e "
          const { chromium } = require('playwright');

          (async () => {
            // Meluncurkan browser chromium dalam mode headless
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();

            try {
              console.log('Membuka halaman target...');
              await page.goto('https://highreach.ai/tools/youtube-shorts-downloader', { waitUntil: 'domcontentloaded', timeout: 60000 });

              // Menunggu kolom input video URL tersedia
              // Menyesuaikan selector input yang umum untuk downloader (bisa diadaptasi jika struktur web berbeda)
              const inputSelector = 'input[type=\"text\"], input[type=\"url\"], #url';
              await page.waitForSelector(inputSelector, { timeout: 15000 });
              
              console.log('Mengisi URL YouTube Shorts...');
              await page.fill(inputSelector, 'https://youtube.com/shorts/tjPDRZgzNLE');
              
              console.log('Menekan Enter untuk memproses...');
              await page.press(inputSelector, 'Enter');

              console.log('Menunggu hasil opsi download siap...');
              // Menunggu spinner atau loading selesai dan tombol/opsi download muncul
              // Opsi download biasanya berupa button atau link di dalam tabel/list
              await page.waitForSelector('a, button', { timeout: 30000 });
              // Memberikan jeda tambahan agar seluruh opsi resolusi ter-render dengan sempurna
              await page.waitForTimeout(5000);

              // Mencari semua element tombol atau link download yang tersedia
              const elements = await page.$$('a, button');
              let targetElement = null;
              let highestQuality = 0;

              console.log('Menganalisis kualitas video terbaik...');
              for (const el of elements) {
                const text = (await el.textContent() || '').toLowerCase();
                const href = await el.getAttribute('href') || '';
                
                // Memastikan ini adalah tombol download/resolusi, bukan menu navigasi website
                if (text.includes('download') || text.includes('mp4') || /\d{3,4}p/.test(text)) {
                  // Utamakan format MP4 jika ada di dalam teks atau attribute href
                  const isMp4 = text.includes('mp4') || href.includes('.mp4');
                  
                  // Ekstrak angka resolusi (misal: 1080p -> 1080, 720p -> 720)
                  const match = text.match(/(\d{3,4})p?/);
                  const quality = match ? parseInt(match[1], 10) : 360; // default ke 360 jika tidak tertulis angkanya

                  // Bobot ekstra untuk MP4 agar diprioritaskan di atas format lain (seperti webm)
                  const score = quality + (isMp4 ? 10000 : 0);

                  if (score > highestQuality) {
                    highestQuality = score;
                    targetElement = el;
                  }
                }
              }

              if (targetElement) {
                console.log(`Menemukan opsi terbaik dengan score/kualitas: ${highestQuality}. Melakukan klik...`);
                
                // Karena mengklik tombol download seringkali memicu navigasi atau membuka tab baru,
                // kita tunggu event navigasi halaman utama atau halaman baru selesai dimuat.
                await Promise.all([
                  page.waitForNavigation({ waitUntil: 'networkidle', timeout: 30000 }).catch(() => console.log('Navigasi selesai atau halaman langsung mengunduh.')),
                  targetElement.click()
                ]);

                // Memberikan jeda beberapa detik untuk memastikan pengalihan URL (anchor button redirection) selesai sepenuhnya
                await page.waitForTimeout(5000);

                // Mengambil URL akhir setelah klik
                const finalUrl = page.url();
                console.log('================ LAPORAN LOG URL ================');
                console.log(`URL Halaman Akhir / Download: ${finalUrl}`);
                console.log('==================================================');

              } else {
                console.log('Gagal mendeteksi tombol atau resolusi download terbaik. Mencoba klik tombol download pertama yang ditemukan.');
                // Fallback jika logika pencarian resolusi terlalu spesifik
                const fallbackBtn = await page.$('a[href*=\"download\"], button:has-text(\"Download\")');
                if (fallbackBtn) {
                  await Promise.all([
                    page.waitForNavigation({ waitUntil: 'networkidle' }).catch(() => {}),
                    fallbackBtn.click()
                  ]);
                  await page.waitForTimeout(5000);
                  console.log(`URL Halaman Akhir (Fallback): ${page.url()}`);
                } else {
                  console.log('Tombol download tidak ditemukan sama sekali. Silakan periksa kembali struktur selector halaman target.');
                }
              }

            } catch (error) {
              console.error('Terjadi kesalahan saat eksekusi:', error);
              // Mengambil screenshot untuk debugging jika terjadi kegagalan sistem di GitHub Actions
              await page.screenshot({ path: 'error-screenshot.png' });
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "

      - name: Upload Screenshot jika Error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error-screenshot.png
