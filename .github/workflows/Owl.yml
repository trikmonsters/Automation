name: Generate Psychology Script and TTS
on:
  workflow_dispatch:
    inputs:
      TOPIC_INPUT:
        description: 'The psychological topic'
        required: true
        default: 'The anatomy of overthinking'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Narrative and TTS
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPIC_INPUT: ${{ github.event.inputs.TOPIC_INPUT }}
        run: |
          # 1. GENERATE NARRATIVE
          SYSTEM_PROMPT="You are an elite, avant-garde psychological storyteller and narrative designer. Every paragraph MUST begin with a 'psychological hook'—a provocative, counter-intuitive insight about the human mind. Use dense, cinematic, and sophisticated prose. No bullet points, no headers. Treat the text as a relentless, high-density stream of consciousness."
          USER_PROMPT="Write a 1500+ word, highly immersive psychological narrative on the topic: '$TOPIC_INPUT'. Ensure the narrative deepens into existential discovery. Write in English."

          echo "--- GENERATING NARRATIVE ---"
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg sp "$SYSTEM_PROMPT" --arg up "$USER_PROMPT" \
              '{model: "openrouter/owl-alpha", messages: [{role: "system", content: $sp}, {role: "user", content: $up}], temperature: 0.7, max_tokens: 8000, presence_penalty: 0.8, frequency_penalty: 0.7}')")
          
          NARRATIVE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$NARRATIVE" > full_script.txt

          # 2. ROBUST SPLIT
          split -n 3 -d full_script.txt part_
          [ -f part_00 ] && mv part_00 part_1.txt || echo "Placeholder" > part_1.txt
          [ -f part_01 ] && mv part_01 part_2.txt || echo "Placeholder" > part_2.txt
          [ -f part_02 ] && mv part_02 part_3.txt || echo "Placeholder" > part_3.txt

          # 3. TTS GENERATION (3 Request, 35s Delay)
          for i in {1..3}; do
            PART_FILE="part_$i.txt"
            echo "Processing Request $i/3: $PART_FILE..."
            
            curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$(cat $PART_FILE)" \
                '{contents: [{parts: [{"text": ("Read this with a deep, cinematic, professional narrator voice: " + $text)}]}]}')" \
              | jq -r '.candidates[0].content.parts[0].inlineData.data' > "audio_$i.base64"
            
            [ -s "audio_$i.base64" ] && base64 -d "audio_$i.base64" > "audio_$i.mp3"
            
            if [ $i -lt 3 ]; then sleep 35; fi
          done

          # 4. MERGE AUDIO
          # Membuat list untuk ffmpeg
          echo "file 'audio_1.mp3'" > list.txt
          echo "file 'audio_2.mp3'" >> list.txt
          echo "file 'audio_3.mp3'" >> list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy final_narration.mp3

      - name: Upload Audio Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-psychology-narrative
          path: final_narration.mp3
