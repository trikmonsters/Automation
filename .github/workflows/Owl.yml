name: Generate Psychology Script and TTS
on:
  workflow_dispatch:
    inputs:
      TOPIC_INPUT:
        description: 'The psychological topic'
        required: true
        default: 'The anatomy of overthinking'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Narrative and TTS
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPIC_INPUT: ${{ github.event.inputs.TOPIC_INPUT }}
        run: |
          # SYSTEM PROMPT DEFINITIVE
          SYSTEM_PROMPT="You are an elite, avant-garde psychological storyteller and narrative designer. Every paragraph MUST begin with a 'psychological hook'—a provocative, counter-intuitive insight about the human mind. Use dense, cinematic, and sophisticated prose with quantum/architectural metaphors. ABSOLUTELY NO: 'In conclusion', 'In summary', generic transitions, or bullet points. Treat the text as a relentless, high-density stream of consciousness."
          USER_PROMPT="Write a 1500+ word, highly immersive psychological narrative on the topic: '$TOPIC_INPUT'. Ensure the narrative deepens into existential discovery. Write in English."

          # 1. GENERATE NARRATIVE
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg sp "$SYSTEM_PROMPT" --arg up "$USER_PROMPT" \
              '{model: "openrouter/owl-alpha", messages: [{role: "system", content: $sp}, {role: "user", content: $up}], temperature: 0.7, max_tokens: 4000, presence_penalty: 0.8, frequency_penalty: 0.7}')")
          
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > full_script.txt

          # 2. SPLIT & TTS WITH 35S DELAY
          # Membagi menjadi 3 file berdasarkan jumlah baris
          split -n 3 --additional-suffix=.txt full_script.txt part_
          
          for i in {1..3}; do
            PART_FILE="part_$i.txt"
            echo "Processing Request $i/3..."
            
            # API Gemini TTS
            curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$(cat $PART_FILE)" \
                '{contents: [{parts: [{"text": ("Read this with a deep, cinematic, professional narrator voice: " + $text)}]}]}')" \
              | jq -r '.candidates[0].content.parts[0].inlineData.data' > "audio_$i.base64"
            
            base64 -d "audio_$i.base64" > "audio_$i.mp3"
            
            # JEDA 35 DETIK
            if [ $i -lt 3 ]; then
              echo "Waiting 35 seconds to respect rate limits..."
              sleep 35
            fi
          done
