name: 🧠 Psychology TTS + AI Image Prompts + Video

# ─────────────────────────────────────────────────────────────────────────────
#  CARA PAKAI
#  1. Simpan ke .github/workflows/gemini-psych-tts.yml
#  2. Settings → Secrets → Actions → New secret: GEMINI_API_KEY
#  3. Isi "script" di input saat Run workflow (pisah paragraf dengan \n\n)
#  4. Workflow menghasilkan:
#     • output/audio.wav              — narasi psikolog
#     • output/timeline.json          — timestamp tiap paragraf
#     • output/image_prompts.json     — prompt AI image per timestamp
#     • output/image_prompts.md       — versi markdown untuk dibaca
#     • output/video.mp4              — video final (audio + gambar slideshow)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:

      script:
        description: "Teks narasi (pisah paragraf dengan \\n\\n — baris kosong)"
        required: true
        type: string
        default: ""

      voice:
        description: "Suara psikolog"
        required: true
        default: "Sulafat"
        type: choice
        options:
          - Sulafat       # warm     — hangat & meyakinkan
          - Sadaltager    # knowledgeable — kompeten & terpercaya
          - Gacrux        # mature   — dewasa & tenang
          - Vindemiatrix  # gentle   — lembut & empatik

      paragraph_gap:
        description: "Jeda antar paragraf (detik)"
        required: true
        default: "1.0"
        type: choice
        options:
          - "0.5"
          - "1.0"
          - "1.5"

      language:
        description: "Bahasa narasi"
        required: true
        default: "id-ID"
        type: choice
        options:
          - id-ID
          - en-US

      image_style:
        description: "Gaya visual untuk image prompts"
        required: true
        default: "cinematic"
        type: choice
        options:
          - cinematic      # realistik, pencahayaan dramatis
          - documentary    # natural, jurnalistik
          - soft-editorial # lembut, majalah kesehatan

jobs:
  tts-video-pipeline:
    name: "TTS → AI Image Prompts → Video"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Cache pip ─────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-google-genai
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install Python deps ───────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --upgrade "google-genai>=1.0"

      # ── 5. Install ffmpeg ────────────────────────────────────────────────
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick
          ffmpeg -version | head -1
          convert -version | head -1

      # ── 6. Tulis script dari input ke file ───────────────────────────────
      - name: Write script input to file
        env:
          SCRIPT_TEXT: ${{ github.event.inputs.script }}
        run: |
          python3 -c "
          import os, sys
          text = os.environ.get('SCRIPT_TEXT', '').strip()
          if not text:
              print('ERROR: Input script kosong. Isi teks narasi di workflow input.')
              sys.exit(1)
          # Ganti literal \n\n dengan newline nyata (dari textarea GitHub)
          text = text.replace('\\\\n\\\\n', '\\n\\n').replace('\\\\n', '\\n')
          os.makedirs('output', exist_ok=True)
          with open('tts-script.txt', 'w', encoding='utf-8') as f:
              f.write(text)
          paragraphs = [p.strip() for p in text.split('\\n\\n') if p.strip()]
          print(f'Script ditulis: {len(paragraphs)} paragraf, {len(text)} karakter')
          for i, p in enumerate(paragraphs):
              print(f'  [{i+1}] {p[:60]}...' if len(p) > 60 else f'  [{i+1}] {p}')
          "

      # ── 7. Generate TTS Audio + Timeline JSON ────────────────────────────
      - name: Generate TTS Audio & Timeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VOICE_NAME:     ${{ github.event.inputs.voice }}
          PARA_GAP:       ${{ github.event.inputs.paragraph_gap }}
          LANGUAGE:       ${{ github.event.inputs.language }}
        run: |
          python3 - << 'PYEOF'
          import os, wave, struct, time, textwrap, json
          from google import genai
          from google.genai import types

          API_KEY     = os.environ["GEMINI_API_KEY"]
          VOICE_NAME  = os.environ.get("VOICE_NAME", "Sulafat")
          PARA_GAP    = float(os.environ.get("PARA_GAP", "1.0"))
          LANGUAGE    = os.environ.get("LANGUAGE", "id-ID")
          SAMPLE_RATE  = 24_000
          SAMPLE_WIDTH = 2   # 16-bit PCM
          CHANNELS     = 1

          with open("tts-script.txt", encoding="utf-8") as f:
              raw = f.read()
          paragraphs = [p.strip() for p in raw.split("\n\n") if p.strip()]

          print(f"Script   : {len(paragraphs)} paragraf")
          print(f"Voice    : {VOICE_NAME}")
          print(f"Gap      : {PARA_GAP}s")
          print(f"Language : {LANGUAGE}")
          print("─" * 60)

          def silence_pcm(sec):
              n = int(SAMPLE_RATE * sec)
              return struct.pack(f"<{n}h", *([0] * n))

          def pcm_duration(pcm):
              return len(pcm) / SAMPLE_RATE / SAMPLE_WIDTH

          def build_prompt(text, idx, total):
              if idx == 0:
                  style = (
                      "Narrate in a calm, warm, and welcoming tone — "
                      "like a trusted psychologist beginning a session. "
                      f"Speak slowly and reassuringly. Language: {LANGUAGE}."
                  )
              elif idx == total - 1:
                  style = (
                      "Narrate in a gentle, compassionate, and hopeful tone — "
                      "like a psychologist closing a session with encouragement. "
                      f"Slow down on key emotional phrases. Language: {LANGUAGE}."
                  )
              else:
                  style = (
                      "Narrate in a clear, knowledgeable, authoritative yet empathetic tone — "
                      "like a clinical psychologist explaining research to a patient. "
                      f"Maintain steady, confident pacing. Language: {LANGUAGE}."
                  )
              return f"{style}\n\n{text}"

          client = genai.Client(api_key=API_KEY)
          all_pcm   = []
          timeline  = []   # [{para, text, start_sec, end_sec, duration_sec}]
          cursor    = 0.0  # running timestamp in seconds

          os.makedirs("output", exist_ok=True)

          for idx, para in enumerate(paragraphs):
              label   = f"Paragraf {idx+1}/{len(paragraphs)}"
              preview = textwrap.shorten(para, 72, placeholder="…")
              print(f"\n🔊 {label}: {preview}")

              prompt = build_prompt(para, idx, len(paragraphs))

              para_pcm = None
              for attempt in range(4):
                  try:
                      resp = client.models.generate_content(
                          model="gemini-3.1-flash-tts-preview",
                          contents=prompt,
                          config=types.GenerateContentConfig(
                              response_modalities=["AUDIO"],
                              speech_config=types.SpeechConfig(
                                  voice_config=types.VoiceConfig(
                                      prebuilt_voice_config=types.PrebuiltVoiceConfig(
                                          voice_name=VOICE_NAME,
                                      )
                                  )
                              ),
                          ),
                      )
                      para_pcm = resp.candidates[0].content.parts[0].inline_data.data
                      break
                  except Exception as e:
                      wait = 2 ** attempt
                      print(f"   ⚠ Attempt {attempt+1} gagal: {e} — retry {wait}s")
                      time.sleep(wait)
                      if attempt == 3:
                          raise RuntimeError(f"Gagal generate {label}") from e

              dur = pcm_duration(para_pcm)
              start = cursor
              end   = cursor + dur
              print(f"   ✅ {dur:.2f}s  |  timestamp {start:.2f}s → {end:.2f}s")

              timeline.append({
                  "para":         idx + 1,
                  "text":         para,
                  "start_sec":    round(start, 3),
                  "end_sec":      round(end, 3),
                  "duration_sec": round(dur, 3),
              })

              all_pcm.append(para_pcm)
              cursor = end

              # Jeda antar paragraf
              if idx < len(paragraphs) - 1:
                  gap_pcm = silence_pcm(PARA_GAP)
                  all_pcm.append(gap_pcm)
                  cursor += PARA_GAP
                  print(f"   ⏸  Jeda {PARA_GAP}s  (cursor → {cursor:.2f}s)")

          # Simpan WAV
          combined = b"".join(all_pcm)
          wav_path = "output/audio.wav"
          with wave.open(wav_path, "wb") as wf:
              wf.setnchannels(CHANNELS)
              wf.setsampwidth(SAMPLE_WIDTH)
              wf.setframerate(SAMPLE_RATE)
              wf.writeframes(combined)

          total_sec = pcm_duration(combined)
          print(f"\n✅ WAV disimpan: {wav_path}  ({total_sec:.1f}s total)")

          # Simpan timeline
          timeline_data = {
              "voice":       VOICE_NAME,
              "language":    LANGUAGE,
              "para_gap_sec": PARA_GAP,
              "total_sec":   round(total_sec, 3),
              "paragraphs":  timeline,
          }
          with open("output/timeline.json", "w", encoding="utf-8") as f:
              json.dump(timeline_data, f, ensure_ascii=False, indent=2)
          print("✅ Timeline disimpan: output/timeline.json")
          PYEOF

      # ── 8. Analisis Audio + Generate Image Prompts via Gemini Text ───────
      - name: AI Analysis & Image Prompt Generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_STYLE:    ${{ github.event.inputs.image_style }}
          LANGUAGE:       ${{ github.event.inputs.language }}
        run: |
          python3 - << 'PYEOF'
          import os, json
          from google import genai

          API_KEY     = os.environ["GEMINI_API_KEY"]
          IMAGE_STYLE = os.environ.get("IMAGE_STYLE", "cinematic")
          LANGUAGE    = os.environ.get("LANGUAGE", "id-ID")

          with open("output/timeline.json", encoding="utf-8") as f:
              timeline = json.load(f)

          paragraphs = timeline["paragraphs"]
          total_sec  = timeline["total_sec"]

          # ── Prompt ke Gemini Text untuk analisis + image prompts ──────────
          style_desc = {
              "cinematic":      "cinematic photography, dramatic lighting, shallow depth of field, 8K, photorealistic",
              "documentary":    "documentary photography, natural lighting, candid, journalistic, authentic, film grain",
              "soft-editorial": "soft editorial photography, pastel tones, health magazine aesthetic, warm light",
          }.get(IMAGE_STYLE, "cinematic photography, photorealistic")

          para_list = "\n".join(
              f'[Para {p["para"]}] {p["start_sec"]}s–{p["end_sec"]}s ({p["duration_sec"]}s)\n"{p["text"]}"'
              for p in paragraphs
          )

          system_prompt = f"""You are an expert video director and AI image prompt engineer specializing in psychology and mental health visual storytelling.

          Your task:
          1. Analyze the audio narration timeline below (a psychology expert speaking)
          2. For EACH paragraph, generate ONE detailed AI image generation prompt
          3. The image must VISUALLY MATCH the emotional tone and content at that exact timestamp
          4. The image will be shown on screen while that paragraph is being narrated
          
          Rules for image prompts:
          - Always write prompts in English (even if narration is in another language)
          - Style: {style_desc}
          - NO text, NO typography, NO captions in the image
          - Show real human emotions, body language, environments — NOT abstract
          - Be specific: describe lighting, angle, subject, background, mood
          - Each prompt must feel DIFFERENT from the previous one (no repetition)
          - Duration hint: shorter paragraphs = simpler/closer shot; longer = wider scene
          
          Output ONLY valid JSON, no explanation, no markdown, exactly this structure:
          {{
            "audio_analysis": "2-3 sentence professional analysis of the narration's emotional arc and pacing",
            "video_concept": "1 sentence overall visual concept for the video",
            "scenes": [
              {{
                "para": 1,
                "start_sec": 0.0,
                "end_sec": 8.5,
                "duration_sec": 8.5,
                "emotion": "welcoming, calm",
                "shot_type": "medium close-up",
                "image_prompt": "Full detailed AI image generation prompt here..."
              }}
            ]
          }}"""
          
                    user_msg = f"""Total audio duration: {total_sec}s
          Narration language: {LANGUAGE}
          Visual style: {IMAGE_STYLE}
          
          TIMELINE:
          {para_list}
          
          Generate the JSON analysis and image prompts now."""

          client = genai.Client(api_key=API_KEY)
          print("🤖 Mengirim ke Gemini untuk analisis + image prompts...")

          resp = client.models.generate_content(
              model="gemini-2.0-flash",
              contents=user_msg,
              config={"system_instruction": system_prompt, "max_output_tokens": 4096},
          )

          raw = resp.text.strip()
          # Bersihkan jika ada markdown fence
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:])
          if raw.endswith("```"):
              raw = "\n".join(raw.split("\n")[:-1])

          result = json.loads(raw)

          # Simpan JSON
          with open("output/image_prompts.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print("✅ image_prompts.json disimpan")

          # Simpan Markdown yang mudah dibaca
          md = []
          md.append("# 🎬 Audio Analysis & AI Image Prompts\n")
          md.append(f"## 📊 Audio Analysis\n{result['audio_analysis']}\n")
          md.append(f"## 🎥 Video Concept\n{result['video_concept']}\n")
          md.append("## 🖼️ Scene-by-Scene Image Prompts\n")

          for s in result["scenes"]:
              md.append(f"### Scene {s['para']}  `{s['start_sec']}s → {s['end_sec']}s` ({s['duration_sec']}s)")
              md.append(f"- **Emotion:** {s['emotion']}")
              md.append(f"- **Shot:** {s['shot_type']}")
              md.append(f"- **Image Prompt:**\n  > {s['image_prompt']}\n")

          with open("output/image_prompts.md", "w", encoding="utf-8") as f:
              f.write("\n".join(md))
          print("✅ image_prompts.md disimpan")

          # Print ringkasan ke log
          print(f"\n{'─'*60}")
          print(f"Audio Analysis  : {result['audio_analysis'][:120]}...")
          print(f"Video Concept   : {result['video_concept']}")
          print(f"Scenes generated: {len(result['scenes'])}")
          for s in result["scenes"]:
              print(f"  [{s['para']}] {s['start_sec']}s–{s['end_sec']}s | {s['emotion']} | {s['shot_type']}")
          PYEOF

      # ── 9. Generate placeholder images + assemble video via ffmpeg ────────
      - name: Generate Placeholder Images & Assemble Video
        env:
          IMAGE_STYLE: ${{ github.event.inputs.image_style }}
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, textwrap

          with open("output/image_prompts.json", encoding="utf-8") as f:
              data = json.load(f)
          with open("output/timeline.json", encoding="utf-8") as f:
              timeline = json.load(f)

          scenes     = data["scenes"]
          para_gap   = timeline["para_gap_sec"]
          total_sec  = timeline["total_sec"]
          IMAGE_STYLE = os.environ.get("IMAGE_STYLE", "cinematic")

          # Warna placeholder per gaya
          palette = {
              "cinematic":      [("1a1a2e", "e0e0e0"), ("16213e", "a8d8ea"), ("0f3460", "f5f5f5")],
              "documentary":    [("2d3436", "dfe6e9"), ("636e72", "b2bec3"), ("353b48", "dcdde1")],
              "soft-editorial": [("ffeaa7", "6c5ce7"), ("fd79a8", "2d3436"), ("a29bfe", "2d3436")],
          }.get(IMAGE_STYLE, [("1a1a2e", "e0e0e0")])

          os.makedirs("output/frames", exist_ok=True)

          # Buat placeholder image per scene dengan ImageMagick
          for i, scene in enumerate(scenes):
              bg, fg = palette[i % len(palette)]
              label  = textwrap.fill(scene["image_prompt"][:120], 40)
              label  = label.replace("'", "\\'").replace('"', '\\"').replace(":", "\\:")
              out    = f"output/frames/scene_{i+1:02d}.png"

              cmd = [
                  "convert",
                  "-size", "1280x720",
                  f"xc:#{bg}",
                  "-fill", f"#{fg}",
                  "-font", "DejaVu-Sans",
                  "-pointsize", "22",
                  "-gravity", "Center",
                  "-annotate", "0",
                  f"[Scene {scene['para']}]\\n{scene['start_sec']}s - {scene['end_sec']}s\\n\\n{scene['emotion']}\\n{scene['shot_type']}\\n\\n--- Replace with AI Image ---",
                  out,
              ]
              subprocess.run(cmd, check=True, capture_output=True)
              print(f"  ✅ Frame {i+1}: {out}")

          # ── Buat ffmpeg concat file dengan timing presisi ─────────────────
          # Setiap scene ditampilkan selama paragraf + setengah jeda berikutnya
          concat_lines = ["ffconcat version 1.0"]
          for i, scene in enumerate(scenes):
              img_path = f"frames/scene_{i+1:02d}.png"
              dur = scene["duration_sec"]
              # Tambah setengah jeda ke scene ini dan setengah ke scene berikutnya
              if i < len(scenes) - 1:
                  dur += para_gap * 0.5
              if i > 0:
                  dur += para_gap * 0.5
              concat_lines.append(f"file '{img_path}'")
              concat_lines.append(f"duration {dur:.3f}")

          # Frame terakhir diulang singkat agar ffmpeg flush
          last_img = f"frames/scene_{len(scenes):02d}.png"
          concat_lines.append(f"file '{last_img}'")
          concat_lines.append("duration 0.1")

          concat_path = "output/concat.txt"
          with open(concat_path, "w") as f:
              f.write("\n".join(concat_lines))
          print(f"\n📋 Concat file:\n" + "\n".join(concat_lines[:20]))

          # ── Render video dengan ffmpeg ─────────────────────────────────────
          video_out = "output/video.mp4"
          cmd = [
              "ffmpeg", "-y",
              "-f", "concat", "-safe", "0",
              "-i", "output/concat.txt",
              "-i", "output/audio.wav",
              "-vf", "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2",
              "-c:v", "libx264", "-preset", "fast", "-crf", "20",
              "-c:a", "aac", "-b:a", "192k",
              "-shortest",
              "-movflags", "+faststart",
              video_out,
          ]
          print("\n🎬 Rendering video dengan ffmpeg...")
          result = subprocess.run(cmd, capture_output=True, text=True)
          if result.returncode != 0:
              print("STDERR:", result.stderr[-2000:])
              raise RuntimeError("ffmpeg gagal")

          size_mb = os.path.getsize(video_out) / 1024 / 1024
          print(f"✅ Video selesai: {video_out}  ({size_mb:.1f} MB)")
          PYEOF

      # ── 10. Upload semua artifact ─────────────────────────────────────────
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: psych-video-${{ github.event.inputs.voice }}-run${{ github.run_number }}
          path: |
            output/audio.wav
            output/video.mp4
            output/timeline.json
            output/image_prompts.json
            output/image_prompts.md
          retention-days: 14

      # ── 11. Job Summary ───────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🧠 Psychology TTS + AI Video Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f output/image_prompts.md ]; then
            cat output/image_prompts.md >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts (tersedia 14 hari)" >> $GITHUB_STEP_SUMMARY
          echo "| File | Keterangan |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`audio.wav\` | Narasi psikolog hasil TTS |" >> $GITHUB_STEP_SUMMARY
          echo "| \`video.mp4\` | Video placeholder (ganti frame dengan AI image) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`timeline.json\` | Timestamp presisi tiap paragraf |" >> $GITHUB_STEP_SUMMARY
          echo "| \`image_prompts.json\` | Prompt AI image + analisis (machine-readable) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`image_prompts.md\` | Prompt AI image + analisis (human-readable) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Langkah selanjutnya:** Gunakan prompt di \`image_prompts.json\` pada Midjourney/DALL-E/Flux, lalu ganti frame placeholder di \`output/frames/\` dan re-render video." >> $GITHUB_STEP_SUMMARY
